<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- PRIMARY SEO — fixes Google, Bing, DuckDuckGo, Yahoo -->
    <title>Getflowetic — White-Label AI Agent Portals for Automation Agencies</title>
    <meta name="description" content="Turn your Vapi, Retell, Make, or n8n automations into branded client portals in 60 seconds. White-label dashboards, Stripe billing, real-time analytics. Built for AI agencies." />
    <meta name="author" content="Getflowetic" />
    <meta name="robots" content="index, follow" />
    <link rel="canonical" href="https://getflowetic.com/" />

    <!-- OPEN GRAPH — fixes LinkedIn, Facebook, Discord, Slack, WhatsApp, iMessage, Telegram -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://getflowetic.com/" />
    <meta property="og:title" content="Getflowetic — White-Label AI Agent Portals for Automation Agencies" />
    <meta property="og:description" content="Turn your Vapi, Retell, Make, or n8n automations into branded client portals in 60 seconds. White-label dashboards, Stripe billing, real-time analytics." />
    <meta property="og:image" content="https://getflowetic.com/og-image.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:image:alt" content="Getflowetic — White-label AI agent portals for automation agencies" />
    <meta property="og:site_name" content="Getflowetic" />
    <meta property="og:locale" content="en_US" />

    <!-- TWITTER CARD — fixes Twitter / X link previews -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:site" content="@Getflowetic" />
    <meta name="twitter:creator" content="@Getflowetic" />
    <meta name="twitter:title" content="Getflowetic — White-Label AI Agent Portals for Automation Agencies" />
    <meta name="twitter:description" content="Turn your Vapi, Retell, Make, or n8n automations into branded client portals in 60 seconds." />
    <meta name="twitter:image" content="https://getflowetic.com/og-image.png" />
    <meta name="twitter:image:alt" content="Getflowetic dashboard preview" />

    <!-- JSON-LD STRUCTURED DATA — unlocks Google Rich Results -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "SoftwareApplication",
      "name": "Getflowetic",
      "url": "https://getflowetic.com",
      "applicationCategory": "BusinessApplication",
      "operatingSystem": "Web",
      "description": "White-label AI agent portals for automation agencies. Connect Vapi, Retell, Make, or n8n and deliver branded client dashboards with Stripe billing in 60 seconds.",
      "offers": {
        "@type": "Offer",
        "price": "0",
        "priceCurrency": "USD",
        "description": "7-day free trial, no credit card required"
      },
      "creator": {
        "@type": "Organization",
        "name": "Getflowetic",
        "url": "https://getflowetic.com",
        "sameAs": [
          "https://twitter.com/Getflowetic",
          "https://linkedin.com/company/getflowetic"
        ]
      }
    }
    </script>

    <!-- FAVICON — self-hosted asset (place favicon.ico in /public/) -->
    <link rel="icon" type="image/x-icon" href="/favicon.ico" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
